desc: "Azure backend — health endpoint includes Azure client check"
runners:
  req: http://nginx:80
steps:
  health_ok:
    desc: "GET /health returns ok with Azure client check present"
    req:
      /health:
        get:
          body: null
    test: |
      current.res.status == 200
      && current.res.body.status == 'ok'
      && current.res.body.service == 'truss'
  health_ready:
    desc: "GET /health/ready returns ok when Azure is reachable and azureClient check passes"
    req:
      /health/ready:
        get:
          body: null
    test: |
      current.res.status == 200
      && current.res.body.status == 'ok'
      && current.res.body.checks[0].name == 'storageRoot'
      && current.res.body.checks[0].status == 'ok'
      && current.res.body.checks[1].name == 'azureClient'
      && current.res.body.checks[1].status == 'ok'
