services:
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    command: ["azurite-blob", "--blobHost", "0.0.0.0", "--blobPort", "10000"]
    # Azurite exposes Blob service on port 10000
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "10000"]
      interval: 5s
      timeout: 3s
      retries: 10

  truss:
    image: ${TRUSS_IMAGE:-truss:local}
    build:
      context: ../..
      dockerfile: Dockerfile
    depends_on:
      azurite:
        condition: service_healthy
    environment:
      TRUSS_BEARER_TOKEN: test-token
      TRUSS_STORAGE_ROOT: /data
      TRUSS_BIND_ADDR: "0.0.0.0:8080"
      TRUSS_STORAGE_BACKEND: azure
      TRUSS_AZURE_CONTAINER: truss-test
      TRUSS_AZURE_ENDPOINT: http://azurite:10000/devstoreaccount1
      AZURE_STORAGE_ACCOUNT_NAME: devstoreaccount1
      TRUSS_ALLOW_INSECURE_URL_SOURCES: "true"
      TRUSS_SIGNED_URL_KEY_ID: test-key
      TRUSS_SIGNED_URL_SECRET: test-secret
      TRUSS_PUBLIC_BASE_URL: http://nginx:80
    volumes:
      - ../fixtures:/data:ro
    read_only: true
    security_opt:
      - no-new-privileges:true

  nginx:
    image: nginx:alpine
    depends_on:
      - truss
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    tmpfs:
      - /tmp/nginx-cache
    # nginx listens on port 80

  runn:
    image: ghcr.io/k1low/runn:latest
    depends_on:
      - nginx
      - truss
      - azurite
    volumes:
      - ./runbooks:/runbooks:ro
      - ./setup-fixtures.sh:/setup-fixtures.sh:ro
      - ../api/wait-for-server.sh:/wait-for-server.sh:ro
      - ../fixtures:/fixtures:ro
    environment:
      SERVER_HOST: nginx
      SERVER_PORT: "80"
    entrypoint: ["/bin/bash", "/setup-fixtures.sh"]
    command: ["runn", "run", "/runbooks/*.yml", "--verbose", "--scopes", "read:parent,run:exec"]
