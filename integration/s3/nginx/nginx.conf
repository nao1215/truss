worker_processes 1;

events {
    worker_connections 64;
}

http {
    # --- proxy cache (simulates CDN edge cache) ---
    proxy_cache_path /tmp/nginx-cache levels=1:2 keys_zone=cdn:1m
                     max_size=32m inactive=10m;

    upstream truss {
        server truss:8080;
    }

    server {
        listen 80;
        server_name _;

        # Close upstream connections after each request to avoid tying up
        # truss worker threads in the keep-alive idle loop (60 s timeout).
        proxy_set_header Connection "close";

        # Public signed-URL endpoints — cacheable.
        # Cache key includes every query parameter that affects the response,
        # matching the guidance in README.md (line 250).
        location /images/by-path {
            proxy_pass http://truss;
            proxy_cache cdn;
            proxy_cache_key "$request_uri";
            proxy_cache_valid 200 10m;

            # Expose cache status so runn can assert HIT / MISS.
            add_header X-Cache-Status $upstream_cache_status always;

            proxy_set_header Host $host;
        }

        location /images/by-url {
            proxy_pass http://truss;
            proxy_cache cdn;
            proxy_cache_key "$request_uri";
            proxy_cache_valid 200 10m;

            add_header X-Cache-Status $upstream_cache_status always;

            proxy_set_header Host $host;
        }

        # Health probes — pass through without caching.
        location /health {
            proxy_pass http://truss;
            proxy_set_header Host $host;
        }

        # Private endpoints — never cached.
        location / {
            proxy_pass http://truss;
            proxy_set_header Host $host;
        }
    }
}
