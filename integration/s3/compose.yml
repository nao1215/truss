services:
  s3mock:
    image: adobe/s3mock:latest
    environment:
      initialBuckets: truss-test
    # s3mock exposes HTTP on 9090 by default
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090"]
      interval: 5s
      timeout: 3s
      retries: 10

  truss:
    image: ${TRUSS_IMAGE:-truss:local}
    build:
      context: ../..
      dockerfile: Dockerfile
    depends_on:
      s3mock:
        condition: service_healthy
    environment:
      TRUSS_BEARER_TOKEN: test-token
      TRUSS_STORAGE_ROOT: /data
      TRUSS_BIND_ADDR: "0.0.0.0:8080"
      TRUSS_STORAGE_BACKEND: s3
      TRUSS_S3_BUCKET: truss-test
      TRUSS_S3_FORCE_PATH_STYLE: "true"
      TRUSS_SIGNED_URL_KEY_ID: test-key
      TRUSS_SIGNED_URL_SECRET: test-secret
      TRUSS_PUBLIC_BASE_URL: http://nginx:80
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_REGION: us-east-1
      AWS_ENDPOINT_URL: http://s3mock:9090
      TRUSS_ALLOW_INSECURE_URL_SOURCES: "true"
      TRUSS_STORAGE_TIMEOUT_SECS: "10"
    volumes:
      - ../fixtures:/data:ro
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health/ready"]
      interval: 2s
      timeout: 2s
      retries: 15
      start_period: 3s

  nginx:
    image: nginx:alpine
    depends_on:
      truss:
        condition: service_healthy
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    tmpfs:
      - /tmp/nginx-cache
    # nginx listens on port 80
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:80/health/ready || exit 1"]
      interval: 2s
      timeout: 2s
      retries: 15
      start_period: 2s

  runn:
    image: ghcr.io/k1low/runn:latest
    depends_on:
      nginx:
        condition: service_healthy
      s3mock:
        condition: service_healthy
    volumes:
      - ./runbooks:/runbooks:ro
      - ./setup-fixtures.sh:/setup-fixtures.sh:ro
      - ../fixtures:/fixtures:ro
    environment:
      SERVER_HOST: nginx
      SERVER_PORT: "80"
    entrypoint: ["/bin/bash", "/setup-fixtures.sh"]
    command: ["runn", "run", "/runbooks/*.yml", "--verbose", "--scopes", "read:parent,run:exec"]
