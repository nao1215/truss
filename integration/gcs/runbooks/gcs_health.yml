desc: "GCS backend — health endpoint includes GCS client check"
runners:
  req: http://nginx:80
steps:
  health_ok:
    desc: "GET /health returns ok with GCS client check present"
    req:
      /health:
        get:
          body: null
    test: |
      current.res.status == 200
      && current.res.body.status == 'ok'
      && current.res.body.service == 'truss'
  health_ready:
    desc: "GET /health/ready returns ok when GCS is reachable and gcsClient check passes"
    req:
      /health/ready:
        get:
          body: null
    test: |
      current.res.status == 200
      && current.res.body.status == 'ok'
      && current.res.body.checks[0].name == 'storageRoot'
      && current.res.body.checks[0].status == 'ok'
      && current.res.body.checks[1].name == 'gcsClient'
      && current.res.body.checks[1].status == 'ok'
