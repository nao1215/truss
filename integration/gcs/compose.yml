services:
  fake-gcs:
    image: fsouza/fake-gcs-server:latest
    command: ["-scheme", "http", "-port", "4443"]
    # fake-gcs-server exposes HTTP on 4443
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:4443/storage/v1/b || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  truss:
    image: ${TRUSS_IMAGE:-truss:local}
    build:
      context: ../..
      dockerfile: Dockerfile
    depends_on:
      fake-gcs:
        condition: service_healthy
    environment:
      TRUSS_BEARER_TOKEN: test-token
      TRUSS_STORAGE_ROOT: /data
      TRUSS_BIND_ADDR: "0.0.0.0:8080"
      TRUSS_STORAGE_BACKEND: gcs
      TRUSS_GCS_BUCKET: truss-test
      TRUSS_GCS_ENDPOINT: http://fake-gcs:4443
      TRUSS_SIGNED_URL_KEY_ID: test-key
      TRUSS_SIGNED_URL_SECRET: test-secret
      TRUSS_PUBLIC_BASE_URL: http://nginx:80
      TRUSS_ALLOW_INSECURE_URL_SOURCES: "true"
      TRUSS_STORAGE_TIMEOUT_SECS: "10"
    volumes:
      - ../fixtures:/data:ro
    read_only: true
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health/live"]
      interval: 2s
      timeout: 2s
      retries: 15
      start_period: 3s

  nginx:
    image: nginx:alpine
    depends_on:
      truss:
        condition: service_healthy
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    tmpfs:
      - /tmp/nginx-cache
    # nginx listens on port 80
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:80/health/live || exit 1"]
      interval: 2s
      timeout: 2s
      retries: 15
      start_period: 2s

  runn:
    image: ghcr.io/k1low/runn:latest
    depends_on:
      nginx:
        condition: service_healthy
      fake-gcs:
        condition: service_healthy
    volumes:
      - ./runbooks:/runbooks:ro
      - ./setup-fixtures.sh:/setup-fixtures.sh:ro
      - ../fixtures:/fixtures:ro
    environment:
      SERVER_HOST: nginx
      SERVER_PORT: "80"
    entrypoint: ["/bin/bash", "/setup-fixtures.sh"]
    command: ["runn", "run", "/runbooks/*.yml", "--verbose", "--scopes", "read:parent,run:exec"]
