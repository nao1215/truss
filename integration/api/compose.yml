services:
  truss:
    image: ${TRUSS_IMAGE:-truss:local}
    build:
      context: ../..
      dockerfile: Dockerfile
    environment:
      TRUSS_BEARER_TOKEN: test-token
      TRUSS_STORAGE_ROOT: /data
      TRUSS_BIND_ADDR: "0.0.0.0:8080"
    volumes:
      - ../fixtures:/data:ro
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health/ready"]
      interval: 2s
      timeout: 2s
      retries: 15
      start_period: 3s

  runn:
    image: ghcr.io/k1low/runn:latest
    depends_on:
      truss:
        condition: service_healthy
    volumes:
      - ./runbooks:/runbooks:ro
      - ../fixtures:/fixtures:ro
    command: ["run", "/runbooks/*.yml", "--verbose", "--scopes", "read:parent"]
