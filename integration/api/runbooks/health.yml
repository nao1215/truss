desc: "Health endpoints - liveness and readiness probes"
runners:
  req: http://truss:8080
steps:
  health:
    desc: "GET /health returns diagnostic JSON with version and checks"
    req:
      /health:
        get:
          body: null
    test: |
      current.res.status == 200
      && current.res.body.status == 'ok'
      && current.res.body.service == 'truss'
      && current.res.body.version != ''
      && current.res.body.uptimeSeconds >= 0
      && len(current.res.body.checks) > 0
  live:
    desc: "GET /health/live returns minimal liveness response"
    req:
      /health/live:
        get:
          body: null
    test: |
      current.res.status == 200
      && current.res.body.status == 'ok'
      && current.res.body.service == 'truss'
      && current.res.body.version != ''
  ready:
    desc: "GET /health/ready returns readiness with checks array"
    req:
      /health/ready:
        get:
          body: null
    test: |
      current.res.status == 200
      && current.res.body.status == 'ok'
      && len(current.res.body.checks) > 0
