services:
  truss:
    build: .
    ports:
      - "8080:8080"
    environment:
      - TRUSS_BEARER_TOKEN=changeme
      - TRUSS_STORAGE_ROOT=/data
      - TRUSS_BIND_ADDR=0.0.0.0:8080
    volumes:
      - ./images:/data:ro
    read_only: true
    security_opt:
      - no-new-privileges:true

