name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for your idea! Please describe the feature you'd like to see.
  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this solve, or what use case does it enable?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How do you think this should work? CLI flags, API parameters, etc.
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches you've thought of.
    validations:
      required: false
  - type: dropdown
    id: interface
    attributes:
      label: Which interface does this affect?
      multiple: true
      options:
        - CLI
        - HTTP Server
        - WASM Demo
        - Library (crate)
    validations:
      required: false
