name: Bug Report
description: Report a bug in truss
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill out the sections below so we can reproduce and fix the issue.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps or command to reproduce the issue.
      placeholder: |
        1. Run `truss photo.png -o out.webp --blur 3.0`
        2. See error ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: truss version
      description: Output of `truss version`.
      placeholder: "0.2.0"
    validations:
      required: true
  - type: dropdown
    id: interface
    attributes:
      label: Interface
      multiple: true
      options:
        - CLI
        - HTTP Server
        - WASM Demo
        - Library (crate)
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "Ubuntu 24.04 / macOS 15 / Windows 11"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / error output
      description: Paste any relevant output. This will be rendered as code.
      render: text
