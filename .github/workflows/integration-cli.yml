name: CLI Integration
on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "integration/cli/**"
      - "integration/fixtures/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "Dockerfile"
      - ".github/workflows/integration-cli.yml"
  pull_request:
    paths:
      - "src/**"
      - "integration/cli/**"
      - "integration/fixtures/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "Dockerfile"
      - ".github/workflows/integration-cli.yml"

concurrency:
  group: integration-cli-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cli-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build and run ShellSpec CLI tests
        run: |
          docker build -t truss-cli-test -f integration/cli/Dockerfile .
          docker run --rm truss-cli-test
