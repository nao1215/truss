name: API Server Integration
on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "integration/api/**"
      - "integration/fixtures/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "Dockerfile"
      - ".github/workflows/integration-api.yml"
  pull_request:
    paths:
      - "src/**"
      - "integration/api/**"
      - "integration/fixtures/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "Dockerfile"
      - ".github/workflows/integration-api.yml"

concurrency:
  group: integration-api-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build truss image with cache
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: truss:local
          cache-from: type=gha,scope=integration
          cache-to: type=gha,mode=max,scope=integration

      - name: Run API integration tests
        run: |
          cd integration/api
          docker compose up --no-build --abort-on-container-exit --exit-code-from runn
        timeout-minutes: 10
        env:
          TRUSS_IMAGE: truss:local

      - name: Cleanup
        if: always()
        run: |
          cd integration/api
          docker compose down --volumes --remove-orphans
