name: API Server Integration
on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "integration/api/**"
      - "integration/fixtures/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "Dockerfile"
      - ".github/workflows/integration-api.yml"
  pull_request:
    paths:
      - "src/**"
      - "integration/api/**"
      - "integration/fixtures/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "Dockerfile"
      - ".github/workflows/integration-api.yml"

concurrency:
  group: integration-api-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run API integration tests
        run: |
          cd integration/api
          docker compose up --build --abort-on-container-exit --exit-code-from runn
        timeout-minutes: 10
      - name: Cleanup
        if: always()
        run: |
          cd integration/api
          docker compose down --volumes --remove-orphans
