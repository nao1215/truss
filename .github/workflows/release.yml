name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract tag name
        id: tag
        run: echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog for this version
        id: changelog
        run: |
          tag="${{ steps.tag.outputs.TAG_NAME }}"
          version="${tag#v}"
          changelog_file="release_notes.md"

          awk -v tag="$tag" -v version="$version" '
            BEGIN { found = 0 }
            $0 ~ "^#{2,3} \\[?" tag "\\]?$" { found = 1; next }
            $0 ~ "^#{2,3} \\[?" version "\\]?$" { found = 1; next }
            /^#{2,3} \[?v?[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?\]?$/ { if (found) exit }
            found { print }
          ' CHANGELOG.md > "$changelog_file"

          if [ ! -s "$changelog_file" ]; then
            echo "- Release $tag" > "$changelog_file"
          fi

          {
            echo "BODY<<EOF"
            cat "$changelog_file"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.TAG_NAME }}
          name: ${{ steps.tag.outputs.TAG_NAME }}
          body: ${{ steps.changelog.outputs.BODY }}
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.TAG_NAME, '-alpha') || contains(steps.tag.outputs.TAG_NAME, '-beta') || contains(steps.tag.outputs.TAG_NAME, '-rc') }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
