name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── 1. Verify tag, run dry-run publish ──────────────────────────────
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Ensure tag matches Cargo.toml version
        run: |
          expected_tag="v$(cargo pkgid | sed -E 's/.*@//')"
          if [ "${GITHUB_REF_NAME}" != "${expected_tag}" ]; then
            echo "::error title=Tag/version mismatch::Expected ${expected_tag} from Cargo.toml, got ${GITHUB_REF_NAME}."
            exit 1
          fi

      - name: Verify publishable package
        run: cargo publish --locked --dry-run

  # ── 2. Publish crate to crates.io ───────────────────────────────────
  publish-crate:
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: read
      id-token: write
    env:
      HAS_CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Authenticate to crates.io with trusted publishing
        if: env.HAS_CARGO_REGISTRY_TOKEN == 'false'
        id: crates-auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish crate with API token
        if: env.HAS_CARGO_REGISTRY_TOKEN == 'true'
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish crate with trusted publishing
        if: env.HAS_CARGO_REGISTRY_TOKEN == 'false'
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-auth.outputs.token }}

  # ── 2b. Build release binaries ──────────────────────────────────────
  build-binaries:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Install cross-compilation toolchain
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build release binary
        run: ${{ matrix.cross && 'cross' || 'cargo' }} build --release --locked --target ${{ matrix.target }} --features "s3,gcs,azure"

      - name: Determine binary path
        id: bin
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            echo "path=target/${{ matrix.target }}/release/truss.exe" >> "$GITHUB_OUTPUT"
            echo "name=truss.exe" >> "$GITHUB_OUTPUT"
          else
            echo "path=target/${{ matrix.target }}/release/truss" >> "$GITHUB_OUTPUT"
            echo "name=truss" >> "$GITHUB_OUTPUT"
          fi

      - name: Strip binary (Linux/macOS)
        if: matrix.os != 'windows-latest' && !matrix.cross
        run: strip ${{ steps.bin.outputs.path }}

      - name: Strip binary (cross aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: aarch64-linux-gnu-strip ${{ steps.bin.outputs.path }}

      - name: Create archive (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: |
          archive_name="truss-${GITHUB_REF_NAME}-${{ matrix.target }}.tar.gz"
          tar czf "${archive_name}" -C "$(dirname ${{ steps.bin.outputs.path }})" ${{ steps.bin.outputs.name }}
          echo "ARCHIVE=${archive_name}" >> "$GITHUB_ENV"

      - name: Create archive (zip)
        if: matrix.archive == 'zip'
        shell: bash
        run: |
          archive_name="truss-${GITHUB_REF_NAME}-${{ matrix.target }}.zip"
          (cd "$(dirname "${{ steps.bin.outputs.path }}")" && 7z a "${GITHUB_WORKSPACE}/${archive_name}" "${{ steps.bin.outputs.name }}")
          echo "ARCHIVE=${archive_name}" >> "$GITHUB_ENV"

      - name: Generate checksum
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            shasum -a 256 "${ARCHIVE}" > "${ARCHIVE}.sha256"
          else
            sha256sum "${ARCHIVE}" > "${ARCHIVE}.sha256"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: |
            ${{ env.ARCHIVE }}
            ${{ env.ARCHIVE }}.sha256

  # ── 3. Build & push container image ─────────────────────────────────
  publish-container:
    runs-on: ubuntu-latest
    needs: [publish-crate, build-binaries]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download x86_64 Linux binary
        uses: actions/download-artifact@v4
        with:
          name: binary-x86_64-unknown-linux-gnu
          path: binaries

      - name: Download aarch64 Linux binary
        uses: actions/download-artifact@v4
        with:
          name: binary-aarch64-unknown-linux-gnu
          path: binaries

      - name: Prepare platform binaries
        run: |
          mkdir -p context-amd64 context-arm64
          tar xzf binaries/truss-*-x86_64-unknown-linux-gnu.tar.gz -C context-amd64
          tar xzf binaries/truss-*-aarch64-unknown-linux-gnu.tar.gz -C context-arm64
          chmod +x context-amd64/truss context-arm64/truss
          cp Dockerfile.release context-amd64/Dockerfile
          cp Dockerfile.release context-arm64/Dockerfile

      - name: Set image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.name }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-') }}
            type=semver,pattern={{version}},value=${{ github.ref_name }}
            type=semver,pattern={{major}}.{{minor}},value=${{ github.ref_name }}

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (amd64)
        uses: docker/build-push-action@v7
        with:
          context: context-amd64
          file: context-amd64/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.image.outputs.name }}:${{ github.ref_name }}-amd64
          labels: ${{ steps.meta.outputs.labels }}

      - name: Build and push (arm64)
        uses: docker/build-push-action@v7
        with:
          context: context-arm64
          file: context-arm64/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.image.outputs.name }}:${{ github.ref_name }}-arm64
          labels: ${{ steps.meta.outputs.labels }}

      - name: Create and push multi-arch manifest
        run: |
          IMAGE="${{ steps.image.outputs.name }}"
          TAGS=(${{ steps.meta.outputs.tags }})
          ARGS=""
          for t in "${TAGS[@]}"; do
            ARGS+=" -t ${t}"
          done
          docker buildx imagetools create ${ARGS} \
            "${IMAGE}:${{ github.ref_name }}-amd64" \
            "${IMAGE}:${{ github.ref_name }}-arm64"

  # ── 4. Create GitHub Release ────────────────────────────────────────
  create-release:
    runs-on: ubuntu-latest
    needs: [publish-container, build-binaries]
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          path: release-assets
          merge-multiple: true

      - name: Generate combined checksums
        run: |
          cd release-assets
          cat *.sha256 | sort > checksums.txt
          rm -f *.sha256

      - name: Extract tag name
        id: tag
        run: echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog for this version
        id: changelog
        run: |
          tag="${{ steps.tag.outputs.TAG_NAME }}"
          version="${tag#v}"
          changelog_file="release_notes.md"

          if [ -f CHANGELOG.md ]; then
            awk -v tag="$tag" -v version="$version" '
              BEGIN { found = 0 }
              $0 ~ "^#{2,3} \\[?" tag "\\]?$" { found = 1; next }
              $0 ~ "^#{2,3} \\[?" version "\\]?$" { found = 1; next }
              /^#{2,3} \[?v?[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?\]?$/ { if (found) exit }
              found { print }
            ' CHANGELOG.md > "$changelog_file"
          else
            echo "::warning::CHANGELOG.md not found, using default release notes"
          fi

          if [ ! -s "$changelog_file" ]; then
            echo "- Release $tag" > "$changelog_file"
          fi

          {
            echo "BODY<<EOF"
            cat "$changelog_file"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.TAG_NAME }}
          name: ${{ steps.tag.outputs.TAG_NAME }}
          body: ${{ steps.changelog.outputs.BODY }}
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.TAG_NAME, '-') }}
          generate_release_notes: false
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
