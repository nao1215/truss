name: Deploy Pages

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-bindgen CLI
        run: |
          if ! wasm-bindgen --version 2>/dev/null | grep -q '0.2.114'; then
            cargo install wasm-bindgen-cli --version 0.2.114
          fi

      - name: Install wasi-sdk
        run: |
          WASI_SDK_VERSION=31
          WASI_SDK_FULL=31.0
          curl -fsSL "https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-${WASI_SDK_VERSION}/wasi-sdk-${WASI_SDK_FULL}-x86_64-linux.tar.gz" | tar xz
          echo "WASI_SDK_PATH=$PWD/wasi-sdk-${WASI_SDK_FULL}-x86_64-linux" >> "$GITHUB_ENV"

      - name: Build Pages artifact
        env:
          CC_wasm32_unknown_unknown: ${{ env.WASI_SDK_PATH }}/bin/clang
          AR_wasm32_unknown_unknown: ${{ env.WASI_SDK_PATH }}/bin/llvm-ar
          CFLAGS_wasm32_unknown_unknown: "--target=wasm32-wasip1 --sysroot=${{ env.WASI_SDK_PATH }}/share/wasi-sysroot"
        run: ./scripts/build-wasm-demo.sh

      - name: Configure Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v4
        with:
          path: web/dist

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
