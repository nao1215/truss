name: Azure Backend Integration
on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "integration/azure/**"
      - "integration/fixtures/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "Dockerfile"
      - ".github/workflows/integration-azure.yml"
  pull_request:
    paths:
      - "src/**"
      - "integration/azure/**"
      - "integration/fixtures/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "Dockerfile"
      - ".github/workflows/integration-azure.yml"

concurrency:
  group: integration-azure-${{ github.ref }}
  cancel-in-progress: true

jobs:
  azure-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build truss image (with S3+GCS+Azure features) with cache
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: truss:local
          cache-from: type=gha,scope=integration-azure
          cache-to: type=gha,mode=max,scope=integration-azure

      - name: Run Azure integration tests
        run: |
          cd integration/azure
          docker compose up --no-build --abort-on-container-exit --exit-code-from runn
        timeout-minutes: 10
        env:
          TRUSS_IMAGE: truss:local

      - name: Cleanup
        if: always()
        run: |
          cd integration/azure
          docker compose down --volumes --remove-orphans
